services:
  freshwork-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freshwork-mcp-server
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8010
      MCP_HTTP_PATH: /mcp
      MCP_DEBUG: "false"
      # Disable DNS-rebinding protection so external clients (Copilot, EC2 public IP) are accepted
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    ports:
      - "8010:8010"
    restart: unless-stopped
